name: Setup pnpm and Node.js
description: Setup pnpm with custom registry and Node.js with cache

inputs:
  install-dependencies:
    description: 'Whether to run pnpm install after setup'
    required: false
    default: 'true'
  package-manager-cache:
    description: 'Should use package manager cache'
    required: false
    default: 'true'
  package-json-file:
    description: 'Path to package.json for reading packageManager version (useful when checkout is not at workspace root)'
    required: false
    default: ''
  cache-dependency-path:
    description: 'Path to pnpm-lock.yaml for cache key (useful when checkout is not at workspace root)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    # Let pnpm/action-setup handle store caching instead of actions/setup-node.
    # setup-node's cache: 'pnpm' runs `pnpm store path --silent` which returns
    # a bogus path on self-hosted runners where pnpm is installed into
    # ~/setup-pnpm/node_modules/.bin/.
    - uses: pnpm/action-setup@v4
      name: Install pnpm
      with:
        run_install: ${{ inputs.install-dependencies == 'true' && '[{"recursive":true,"args":["--frozen-lockfile","--ignore-scripts"]}]' || 'false' }}
        package_json_file: ${{ inputs.package-json-file || 'package.json' }}
        cache: ${{ inputs.package-manager-cache == 'true' }}
        cache_dependency_path: ${{ inputs.cache-dependency-path || 'pnpm-lock.yaml' }}

    - name: Setup Node.js 22.x
      uses: actions/setup-node@v6
      with:
        node-version: 22.13.0
