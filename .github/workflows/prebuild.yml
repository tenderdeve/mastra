name: Prebuild

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, 0.x]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_code: ${{ steps.filter.outputs.has_code }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} \
            | grep -vE '^(docs/|examples/|\.changeset/|explorations/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "has_code=true" >> $GITHUB_OUTPUT
          else
            echo "has_code=false" >> $GITHUB_OUTPUT
          fi

  prebuild:
    name: Build
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      needs.changes.outputs.has_code == 'true' &&
      github.repository == 'mastra-ai/mastra' &&
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: remote:rw
      NODE_OPTIONS: --max-old-space-size=8192
    permissions:
      pull-requests: read
      statuses: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Setup custom action
        continue-on-error: true
        uses: ./.github/workflows/shared-actions/set-pr-status
        with:
          status: 'pending'
          context: 'Full Test Suite'
          description: 'Waiting for build to complete'
          sha: ${{ github.event.pull_request.head.sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm turbo --filter "!./examples/**/*" --filter "!./docs/" --filter "!./explorations/**/*" build

      - name: Archive build outputs
        run: |
          find . -type d \( -name dist -o -name .next \) \
            ! -path '*/node_modules/*' \
            ! -path '*/.next/cache*' \
            | sed 's#^\./##' > prebuild-output-paths.txt

          if [ ! -s prebuild-output-paths.txt ]; then
            echo 'No build outputs found to archive.'
            exit 1
          fi

          tar \
            --exclude='*/.next/cache' \
            --exclude='*/.next/cache/*' \
            -czf prebuild-outputs.tar.gz \
            -T prebuild-output-paths.txt

      - name: Upload build outputs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: prebuild-outputs
          path: prebuild-outputs.tar.gz
          retention-days: 1
